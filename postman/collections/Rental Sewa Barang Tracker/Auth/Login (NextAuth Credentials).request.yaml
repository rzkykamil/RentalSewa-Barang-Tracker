$kind: http-request
name: Login (NextAuth Credentials)
method: POST
url: "{{baseUrl}}api/auth/callback/credentials"
description: Login via NextAuth credentials provider. Jalankan **Get CSRF Token** dulu di request sebelumnya supaya {{csrfToken}} terisi. `json=true` membuat NextAuth membalas JSON `{ url }` alih-alih redirect 302, supaya lebih mudah dites di Postman. Session cookie (`next-auth.session-token`, httpOnly) otomatis disimpan oleh cookie jar Postman untuk request berikutnya di environment yang sama. Body memakai `{{email}}`/`{{password}}` (default akun Renter contoh) — ganti body request ini ke `{{ownerEmail}}`/`{{ownerPassword}}` untuk mendapat session Owner, dibutuhkan folder **Items** untuk request `Create Item`/`Update Item`/`Deactivate Item`.
scripts:
  - type: afterResponse
    code: |
      // Sukses login: NextAuth balas 200 dengan { url } (tanpa "error=...").
      // Gagal (kredensial salah / rate limited): url mengandung query "error".
      const res = pm.response.json();
      pm.test('Login tidak mengandung error param', function () {
        pm.expect(res?.url || '').to.not.include('error=');
      });
    language: text/javascript
order: 2000
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    csrfToken: "{{csrfToken}}"
    email: "{{email}}"
    password: "{{password}}"
    json: "true"
    redirect: "false"
